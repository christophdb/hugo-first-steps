<script type="application/ld+json">
    [
        {
            "@context": "https://schema.org",
            "@type": "TechArticle",
            "headline": "{{ .Title | safeJS }}",
            "description": "{{ .Params.seo.description | safeJS }}",
            "url": {{ .Permalink | plainify }},
            "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" | safeJS }}",
            "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | safeJS }}",
            "inLanguage": "{{ .Language.Lang | safeJS }}",
            "author": {
                "@type": "Organization",
                "name": "SeaTable",
                "url": {{ .Site.BaseURL | plainify }}
            },
            "publisher": {
                "@type": "Organization",
                "name": "SeaTable",
                "url": {{ .Site.BaseURL | plainify }},
                "logo": {
                "@type": "ImageObject",
                "url": "https://seatable.com/images/seatable-logo.svg"
                }
            }
        },
        {
            "@context": "https://schema.org",
            "@type": "BreadcrumbList",
            "itemListElement": [
                {
                    "@type": "ListItem",
                    "position": 1,
                    "name": "{{ T "support_table.help_area" }}",
                    "item": {{ ref . "/help" | plainify }}
                },
                {
                    "@type": "ListItem",
                    "position": 2,
                    "name": "{{ .Title | safeJS }}",
                    "item": {{ .Permalink | plainify }}
                }
            ]
        }
    ]
</script>
